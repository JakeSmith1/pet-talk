name: PetTalk
options:
  bundleIdPrefix: com.pettalk
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "WUP45X339T"

targets:
  PetTalk:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - PetTalk
    resources:
      - PetTalk/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pettalk.app
        INFOPLIST_FILE: PetTalk/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 1.0.0

schemes:
  PetTalk:
    build:
      targets:
        PetTalk: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
