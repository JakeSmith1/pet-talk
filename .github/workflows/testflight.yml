name: Deploy to TestFlight

on:
  workflow_dispatch: # Manual trigger from GitHub Actions tab
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          mkdir -p ~/private_keys
          cp ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 ~/private_keys/

      - name: Archive
        run: |
          xcodebuild archive \
            -project PetTalk.xcodeproj \
            -scheme PetTalk \
            -destination 'generic/platform=iOS' \
            -archivePath build/PetTalk.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_KEY_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=WUP45X339T

      - name: Export and Upload
        run: |
          xcodebuild -exportArchive \
            -archivePath build/PetTalk.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_KEY_ISSUER_ID }} \
            DEVELOPMENT_TEAM=WUP45X339T

      - name: Upload to TestFlight (fallback)
        if: failure()
        run: |
          # If exportArchive with upload fails, try manual upload
          IPA=$(find build/export -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            xcrun altool --upload-app \
              --type ios \
              --file "$IPA" \
              --apiKey ${{ secrets.ASC_KEY_ID }} \
              --apiIssuer ${{ secrets.ASC_KEY_ISSUER_ID }}
          fi
