name: Deploy to TestFlight

on:
  workflow_dispatch: # Manual trigger from GitHub Actions tab
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install Fastlane
        run: gem install fastlane

      - name: Write ASC API key JSON
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_ISSUER_ID: ${{ secrets.ASC_KEY_ISSUER_ID }}
        run: |
          python3 -c "
          import json, os
          data = {
              'key_id': os.environ['ASC_KEY_ID'],
              'issuer_id': os.environ['ASC_KEY_ISSUER_ID'],
              'key': os.environ['ASC_KEY_P8']
          }
          with open('/tmp/asc_key.json', 'w') as f:
              json.dump(data, f)
          print('API key JSON written successfully')
          "

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -t 3600 -u $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Create distribution certificate and profile
        run: |
          # Create/fetch iOS distribution certificate
          fastlane run get_certificates \
            api_key_path:"/tmp/asc_key.json" \
            platform:"ios" \
            keychain_path:"$KEYCHAIN_PATH" \
            keychain_password:"actions" \
            generate_apple_certs:true

          # Create/fetch distribution provisioning profile
          fastlane run get_provisioning_profile \
            api_key_path:"/tmp/asc_key.json" \
            app_identifier:"com.pettalk.app" \
            platform:"ios" \
            type:"appstore" \
            force:true

      - name: Archive
        run: |
          # Find the provisioning profile UUID
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          echo "Using profile: $PROFILE_UUID"

          xcodebuild archive \
            -project PetTalk.xcodeproj \
            -scheme PetTalk \
            -destination 'generic/platform=iOS' \
            -archivePath build/PetTalk.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=WUP45X339T \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"

      - name: Export IPA
        run: |
          # Find provisioning profile UUID for ExportOptions
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))

          # Create export options with manual signing
          cat > /tmp/ExportOptions.plist <<PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>WUP45X339T</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.pettalk.app</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath build/PetTalk.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          fastlane run upload_to_testflight \
            ipa:"build/export/PetTalk.ipa" \
            api_key_path:"/tmp/asc_key.json" \
            skip_waiting_for_build_processing:true
