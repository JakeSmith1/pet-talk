name: Deploy to TestFlight

on:
  workflow_dispatch: # Manual trigger from GitHub Actions tab
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install Fastlane
        run: gem install fastlane

      - name: Write ASC API key JSON
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_ISSUER_ID: ${{ secrets.ASC_KEY_ISSUER_ID }}
        run: |
          python3 -c "
          import json, os
          data = {
              'key_id': os.environ['ASC_KEY_ID'],
              'issuer_id': os.environ['ASC_KEY_ISSUER_ID'],
              'key': os.environ['ASC_KEY_P8'],
              'in_house': False
          }
          with open('/tmp/asc_key.json', 'w') as f:
              json.dump(data, f)
          print('API key JSON written successfully')
          "

      - name: Set up keychain and import certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -t 3600 -u $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Install Apple WWDR intermediate certificate (required for distribution)
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/AppleWWDRCAG3.cer
          security import /tmp/AppleWWDRCAG3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign

          # Decode and import distribution certificate .p12
          echo "$DIST_CERT_P12" | base64 -D > /tmp/dist.p12
          security import /tmp/dist.p12 -k $KEYCHAIN_PATH -P "$DIST_CERT_PASSWORD" -T /usr/bin/codesign
          rm /tmp/dist.p12

          # Allow codesign to access keychain without prompts
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" $KEYCHAIN_PATH

          # Verify certificate is installed
          echo "Installed signing identities:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Fetch provisioning profile
        run: |
          fastlane run get_provisioning_profile \
            api_key_path:"/tmp/asc_key.json" \
            app_identifier:"com.pettalk.app" \
            platform:"ios" \
            force:true

          # Extract profile UUID from installed profile
          PROFILE_PATH=$(find . ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" 2>/dev/null | head -1)
          echo "Found profile at: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | grep -A1 UUID | grep string | sed 's/.*<string>//' | sed 's/<\/string>//')
          echo "Profile UUID: $PROFILE_UUID"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Archive
        run: |
          xcodebuild archive \
            -project PetTalk.xcodeproj \
            -scheme PetTalk \
            -destination 'generic/platform=iOS' \
            -archivePath build/PetTalk.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=WUP45X339T \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        run: |
          # Generate ExportOptions.plist with the correct profile UUID
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>WUP45X339T</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.pettalk.app</key>
                  <string>$PROFILE_UUID</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/PetTalk.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

          echo "Exported IPA:"
          ls -lh build/export/*.ipa

      - name: Upload to TestFlight
        run: |
          fastlane run upload_to_testflight \
            ipa:"build/export/PetTalk.ipa" \
            api_key_path:"/tmp/asc_key.json" \
            skip_waiting_for_build_processing:true
